<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Street QR - Language Selection</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Be Vietnam Pro",sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0b5ed7,#00b4d8)}
.card{width:420px;max-width:92%;background:#fff;border-radius:24px;overflow:hidden;box-shadow:0 20px 50px rgba(0,0,0,.25)}
.hero{height:220px;background:linear-gradient(rgba(0,0,0,.45),rgba(0,0,0,.45)),url('https://images.unsplash.com/photo-1519501025264-65ba15a82390?auto=format&fit=crop&w=1200&q=80') center/cover;display:flex;align-items:flex-end}
.hero div{padding:24px;color:#fff}
.content{padding:28px}
h2{text-align:center;margin-bottom:8px}
p{text-align:center;color:#666;line-height:1.6}
.buttons{display:flex;flex-direction:column;gap:16px;margin-top:28px}
button{border:none;border-radius:14px;padding:18px;font-size:18px;font-weight:700;cursor:pointer;transition:.25s}
button:hover{transform:translateY(-2px);box-shadow:0 10px 20px rgba(0,0,0,.15)}
.vi{background:#0b5ed7;color:#fff}
.en{background:#20c997;color:#fff}
.footer{text-align:center;font-size:13px;color:#888;margin-top:24px}
</style>
</head>
<body>
<div class="card">
<div class="hero">
<div>
<h1>HỆ THỐNG QR TÊN ĐƯỜNG</h1>
<p style="color:#fff;text-align:left">Street QR Information System</p>
</div>
</div>
<div class="content">
<h2>🌐 Chọn ngôn ngữ / Select Language</h2>
<p>Vui lòng chọn ngôn ngữ để xem thông tin tuyến đường.<br>Please choose your preferred language.</p>

<div class="buttons">
<button class="vi" onclick="go('vi.html')">🇻🇳 Tiếng Việt</button>
<button class="en" onclick="go('en.html')">🇬🇧 English</button>
</div>

<div class="footer">
Sở Văn hóa, Thể thao và Du lịch tỉnh Nghệ An<br>
QR Street Information Demo
</div>
</div>
</div>

<script>
function go(page){
  localStorage.setItem("language",page==="vi.html"?"vi":"en");
  window.location.href=page;
}
const saved=localStorage.getItem("language");
if(saved==="vi"){console.log("Saved: Vietnamese")}
if(saved==="en"){console.log("Saved: English")}
</script>
</body>
</html>
